name: 'Setup Flutter'
description: 'Setup Flutter SDK with caching'

inputs:
  flutter-version:
    description: 'Flutter version to install'
    required: true
    default: '3.35.7'

runs:
  using: 'composite'
  steps:
    - name: 🦋 Setup Flutter
      run: |
        # Check runner architecture first
        echo "Runner OS: $RUNNER_OS"
        echo "Runner Architecture: $RUNNER_ARCH"
        uname -a
        sysctl -n machdep.cpu.brand_string 2>/dev/null || echo "CPU info not available"
        
        # Download and setup Flutter manually
        FLUTTER_VERSION="${{ inputs.flutter-version }}"
        
        # Try ARM64 first, fallback to x64 if it fails
        FLUTTER_ARCHIVE="flutter_macos_arm64_${FLUTTER_VERSION}-stable.zip"
        FLUTTER_URL="https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/${FLUTTER_ARCHIVE}"
        
        echo "Attempting to download ARM64 Flutter ${FLUTTER_VERSION}..."
        if curl -L --fail "$FLUTTER_URL" -o "$RUNNER_TEMP/flutter.zip" 2>/dev/null; then
          echo "ARM64 archive downloaded successfully"
        else
          echo "ARM64 archive failed, trying x64..."
          FLUTTER_ARCHIVE="flutter_macos_${FLUTTER_VERSION}-stable.zip"
          FLUTTER_URL="https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/${FLUTTER_ARCHIVE}"
          curl -L "$FLUTTER_URL" -o "$RUNNER_TEMP/flutter.zip"
        fi
        
        echo "Extracting Flutter..."
        unzip -q "$RUNNER_TEMP/flutter.zip" -d "$RUNNER_TEMP"
        
        echo "Setting up Flutter path..."
        FLUTTER_BIN="$RUNNER_TEMP/flutter/bin"
        echo "$FLUTTER_BIN" >> $GITHUB_PATH
        export PATH="$FLUTTER_BIN:$PATH"
        
        echo "Checking Flutter binary permissions..."
        ls -la "$FLUTTER_BIN/flutter"
        ls -la "$FLUTTER_BIN/cache/dart-sdk/bin/dart"
        
        echo "Running flutter doctor to initialize..."
        "$FLUTTER_BIN/flutter" doctor --verbose || echo "Flutter doctor failed, but continuing..."
        
        echo "Verifying Flutter installation..."
        "$FLUTTER_BIN/flutter" --version
      shell: bash

    - name: 📦 Install Flutter Dependencies
      run: flutter pub get
      shell: bash
      working-directory: packages/mobile