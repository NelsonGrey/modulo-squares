name: 🔐 Test Repository Secrets

on:
  workflow_dispatch:
    inputs:
      test_firebase_tokens:
        description: 'Test Firebase tokens by attempting authentication'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '18'

jobs:
  test-secrets:
    name: 🔐 Test Repository Secrets
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install Firebase CLI
        run: npm install -g firebase-tools

      - name: 🔍 Check Secret Availability
        run: |
          echo "## 🔐 Repository Secrets Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Secret | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|---------|" >> $GITHUB_STEP_SUMMARY

          # Firebase Tokens (CI/CD Pipeline)
          ENVIRONMENTS=("PRODUCTION" "STAGING" "DEVELOPMENT")
          for env in "${ENVIRONMENTS[@]}"; do
            secret_name="FIREBASE_TOKEN_${env}"
            if [[ -n "${!secret_name:-}" ]]; then
              echo "| $secret_name | ✅ Available | CI/CD Firebase auth token |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $secret_name | ❌ Missing | CI/CD Firebase auth token |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Firebase App IDs (CI/CD Pipeline)
          for env in "${ENVIRONMENTS[@]}"; do
            secret_name="FIREBASE_APP_ID_${env}"
            if [[ -n "${!secret_name:-}" ]]; then
              echo "| $secret_name | ✅ Available | Firebase App Distribution ID |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $secret_name | ❌ Missing | Firebase App Distribution ID |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Firebase Service Account Keys (App Distribution)
          SERVICE_ACCOUNT_SECRETS=("FIREBASE_SERVICE_ACCOUNT_KEY" "IOS_SERVICE_ACCOUNT_KEY")
          for secret_name in "${SERVICE_ACCOUNT_SECRETS[@]}"; do
            if [[ -n "${!secret_name:-}" ]]; then
              echo "| $secret_name | ✅ Available | Firebase service account JSON |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $secret_name | ❌ Missing | Firebase service account JSON |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Mobile App Store Credentials
          MOBILE_SECRETS=(
            "GOOGLE_PLAY_JSON_KEY:Google Play Store JSON key"
            "APPLE_APP_STORE_KEY_ID:Apple App Store Key ID"
            "APPLE_APP_STORE_ISSUER_ID:Apple App Store Issuer ID"
            "APPLE_APP_STORE_PRIVATE_KEY:Apple App Store Private Key"
            "IOS_CERTIFICATE:Apple iOS Certificate"
            "IOS_CERTIFICATE_PASSWORD:Apple iOS Certificate Password"
            "IOS_PROVISIONING_PROFILE:Apple iOS Provisioning Profile"
          )
          for secret_info in "${MOBILE_SECRETS[@]}"; do
            secret_name=$(echo $secret_info | cut -d':' -f1)
            description=$(echo $secret_info | cut -d':' -f2)
            if [[ -n "${!secret_name:-}" ]]; then
              echo "| $secret_name | ✅ Available | $description |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $secret_name | ❌ Missing | $description |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # AdMob and Analytics
          ANALYTICS_SECRETS=(
            "ADMOB_APP_ID_ANDROID:AdMob Android App ID"
            "ADMOB_APP_ID_IOS:AdMob iOS App ID"
            "ADMOB_BANNER_UNIT_ID_ANDROID:AdMob Android Banner Unit ID"
            "ADMOB_BANNER_UNIT_ID_IOS:AdMob iOS Banner Unit ID"
            "ADMOB_INTERSTITIAL_UNIT_ID_ANDROID:AdMob Android Interstitial Unit ID"
            "ADMOB_INTERSTITIAL_UNIT_ID_IOS:AdMob iOS Interstitial Unit ID"
            "ADMOB_REWARDED_UNIT_ID_ANDROID:AdMob Android Rewarded Unit ID"
            "ADMOB_REWARDED_UNIT_ID_IOS:AdMob iOS Rewarded Unit ID"
            "FIREBASE_ANALYTICS_API_SECRET:Firebase Analytics API Secret"
            "GOOGLE_ANALYTICS_TRACKING_ID:Google Analytics Tracking ID"
          )
          for secret_info in "${ANALYTICS_SECRETS[@]}"; do
            secret_name=$(echo $secret_info | cut -d':' -f1)
            description=$(echo $secret_info | cut -d':' -f2)
            if [[ -n "${!secret_name:-}" ]]; then
              echo "| $secret_name | ✅ Available | $description |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $secret_name | ❌ Missing | $description |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Push Notifications
          PUSH_SECRETS=(
            "FCM_SERVER_KEY:Firebase Cloud Messaging Server Key"
            "APNS_CERTIFICATE:Apple Push Notification Certificate"
            "APNS_CERTIFICATE_PASSWORD:Apple Push Notification Certificate Password"
            "APNS_KEY_ID:Apple Push Notification Key ID"
            "APNS_TEAM_ID:Apple Push Notification Team ID"
          )
          for secret_info in "${PUSH_SECRETS[@]}"; do
            secret_name=$(echo $secret_info | cut -d':' -f1)
            description=$(echo $secret_info | cut -d':' -f2)
            if [[ -n "${!secret_name:-}" ]]; then
              echo "| $secret_name | ✅ Available | $description |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $secret_name | ❌ Missing | $description |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Database and Storage
          DATABASE_SECRETS=(
            "FIREBASE_DATABASE_URL:Firebase Realtime Database URL"
            "FIRESTORE_PROJECT_ID:Firestore Project ID"
            "SUPABASE_URL:Supabase URL"
            "SUPABASE_ANON_KEY:Supabase Anonymous Key"
            "SUPABASE_SERVICE_ROLE_KEY:Supabase Service Role Key"
            "AWS_ACCESS_KEY_ID:AWS Access Key ID"
            "AWS_SECRET_ACCESS_KEY:AWS Secret Access Key"
            "AWS_REGION:AWS Region"
            "AZURE_STORAGE_CONNECTION_STRING:Azure Storage Connection String"
          )
          for secret_info in "${DATABASE_SECRETS[@]}"; do
            secret_name=$(echo $secret_info | cut -d':' -f1)
            description=$(echo $secret_info | cut -d':' -f2)
            if [[ -n "${!secret_name:-}" ]]; then
              echo "| $secret_name | ✅ Available | $description |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $secret_name | ❌ Missing | $description |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # API Keys and External Services
          API_SECRETS=(
            "STRIPE_PUBLISHABLE_KEY:Stripe Publishable Key"
            "STRIPE_SECRET_KEY:Stripe Secret Key"
            "STRIPE_WEBHOOK_SECRET:Stripe Webhook Secret"
            "SENDGRID_API_KEY:SendGrid API Key"
            "TWILIO_ACCOUNT_SID:Twilio Account SID"
            "TWILIO_AUTH_TOKEN:Twilio Auth Token"
            "TWILIO_PHONE_NUMBER:Twilio Phone Number"
            "SLACK_WEBHOOK_URL:Slack Webhook URL"
            "DISCORD_WEBHOOK_URL:Discord Webhook URL"
            "SENTRY_DSN:Sentry DSN"
            "ROLLBAR_ACCESS_TOKEN:Rollbar Access Token"
          )
          for secret_info in "${API_SECRETS[@]}"; do
            secret_name=$(echo $secret_info | cut -d':' -f1)
            description=$(echo $secret_info | cut -d':' -f2)
            if [[ -n "${!secret_name:-}" ]]; then
              echo "| $secret_name | ✅ Available | $description |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $secret_name | ❌ Missing | $description |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Code Signing and Security
          SECURITY_SECRETS=(
            "CODE_SIGNING_CERTIFICATE:Code Signing Certificate"
            "CODE_SIGNING_CERTIFICATE_PASSWORD:Code Signing Certificate Password"
            "SSH_PRIVATE_KEY:SSH Private Key"
            "GPG_PRIVATE_KEY:GPG Private Key"
            "JWT_SECRET:JWT Secret Key"
            "ENCRYPTION_KEY:Data Encryption Key"
          )
          for secret_info in "${SECURITY_SECRETS[@]}"; do
            secret_name=$(echo $secret_info | cut -d':' -f1)
            description=$(echo $secret_info | cut -d':' -f2)
            if [[ -n "${!secret_name:-}" ]]; then
              echo "| $secret_name | ✅ Available | $description |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $secret_name | ❌ Missing | $description |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Test GITHUB_TOKEN
          if [[ -n "$GITHUB_TOKEN" ]]; then
            echo "| GITHUB_TOKEN | ✅ Available | Auto-provided by GitHub |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| GITHUB_TOKEN | ❌ Missing | Should be auto-provided |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test completed at**: $(date)" >> $GITHUB_STEP_SUMMARY

      - name: 🔧 Test Firebase Token Authentication
        if: inputs.test_firebase_tokens == true
        run: |
          echo "## 🔑 Firebase Token Authentication Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          ENVIRONMENTS=("PRODUCTION" "STAGING" "DEVELOPMENT")
          for env in "${ENVIRONMENTS[@]}"; do
            token_var="FIREBASE_TOKEN_${env}"
            app_id_var="FIREBASE_APP_ID_${env}"

            if [[ -n "${!token_var:-}" && -n "${!app_id_var:-}" ]]; then
              echo "### Testing $env Environment" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY

              # Test Firebase authentication
              if firebase projects:list --token="${!token_var}" > /dev/null 2>&1; then
                echo "| Firebase Auth | ✅ Success | Token valid for $env |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| Firebase Auth | ❌ Failed | Token invalid for $env |" >> $GITHUB_STEP_SUMMARY
              fi

              echo "" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $env Environment | ⚠️ Skipped | Missing token or app ID |" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: 📊 Generate Final Report
        run: |
          echo "## 📋 Final Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count available secrets by category
          CI_CD_SECRETS=0
          MOBILE_SECRETS=0
          ANALYTICS_SECRETS=0
          PUSH_SECRETS=0
          DATABASE_SECRETS=0
          API_SECRETS=0
          SECURITY_SECRETS=0

          # CI/CD Firebase secrets (6 total: 3 tokens + 3 app IDs)
          [[ -n "$FIREBASE_TOKEN_PRODUCTION" ]] && ((CI_CD_SECRETS++))
          [[ -n "$FIREBASE_APP_ID_PRODUCTION" ]] && ((CI_CD_SECRETS++))
          [[ -n "$FIREBASE_TOKEN_STAGING" ]] && ((CI_CD_SECRETS++))
          [[ -n "$FIREBASE_APP_ID_STAGING" ]] && ((CI_CD_SECRETS++))
          [[ -n "$FIREBASE_TOKEN_DEVELOPMENT" ]] && ((CI_CD_SECRETS++))
          [[ -n "$FIREBASE_APP_ID_DEVELOPMENT" ]] && ((CI_CD_SECRETS++))

          # Mobile App Store secrets (7 total)
          [[ -n "$FIREBASE_SERVICE_ACCOUNT_KEY" ]] && ((MOBILE_SECRETS++))
          [[ -n "$IOS_SERVICE_ACCOUNT_KEY" ]] && ((MOBILE_SECRETS++))
          [[ -n "$GOOGLE_PLAY_JSON_KEY" ]] && ((MOBILE_SECRETS++))
          [[ -n "$APPLE_APP_STORE_KEY_ID" ]] && ((MOBILE_SECRETS++))
          [[ -n "$APPLE_APP_STORE_ISSUER_ID" ]] && ((MOBILE_SECRETS++))
          [[ -n "$APPLE_APP_STORE_PRIVATE_KEY" ]] && ((MOBILE_SECRETS++))
          [[ -n "$IOS_CERTIFICATE" ]] && ((MOBILE_SECRETS++))
          [[ -n "$IOS_CERTIFICATE_PASSWORD" ]] && ((MOBILE_SECRETS++))
          [[ -n "$IOS_PROVISIONING_PROFILE" ]] && ((MOBILE_SECRETS++))

          # Analytics secrets (10 total)
          [[ -n "$ADMOB_APP_ID_ANDROID" ]] && ((ANALYTICS_SECRETS++))
          [[ -n "$ADMOB_APP_ID_IOS" ]] && ((ANALYTICS_SECRETS++))
          [[ -n "$ADMOB_BANNER_UNIT_ID_ANDROID" ]] && ((ANALYTICS_SECRETS++))
          [[ -n "$ADMOB_BANNER_UNIT_ID_IOS" ]] && ((ANALYTICS_SECRETS++))
          [[ -n "$ADMOB_INTERSTITIAL_UNIT_ID_ANDROID" ]] && ((ANALYTICS_SECRETS++))
          [[ -n "$ADMOB_INTERSTITIAL_UNIT_ID_IOS" ]] && ((ANALYTICS_SECRETS++))
          [[ -n "$ADMOB_REWARDED_UNIT_ID_ANDROID" ]] && ((ANALYTICS_SECRETS++))
          [[ -n "$ADMOB_REWARDED_UNIT_ID_IOS" ]] && ((ANALYTICS_SECRETS++))
          [[ -n "$FIREBASE_ANALYTICS_API_SECRET" ]] && ((ANALYTICS_SECRETS++))
          [[ -n "$GOOGLE_ANALYTICS_TRACKING_ID" ]] && ((ANALYTICS_SECRETS++))

          # Push notification secrets (5 total)
          [[ -n "$FCM_SERVER_KEY" ]] && ((PUSH_SECRETS++))
          [[ -n "$APNS_CERTIFICATE" ]] && ((PUSH_SECRETS++))
          [[ -n "$APNS_CERTIFICATE_PASSWORD" ]] && ((PUSH_SECRETS++))
          [[ -n "$APNS_KEY_ID" ]] && ((PUSH_SECRETS++))
          [[ -n "$APNS_TEAM_ID" ]] && ((PUSH_SECRETS++))

          # Database and storage secrets (9 total)
          [[ -n "$FIREBASE_DATABASE_URL" ]] && ((DATABASE_SECRETS++))
          [[ -n "$FIRESTORE_PROJECT_ID" ]] && ((DATABASE_SECRETS++))
          [[ -n "$SUPABASE_URL" ]] && ((DATABASE_SECRETS++))
          [[ -n "$SUPABASE_ANON_KEY" ]] && ((DATABASE_SECRETS++))
          [[ -n "$SUPABASE_SERVICE_ROLE_KEY" ]] && ((DATABASE_SECRETS++))
          [[ -n "$AWS_ACCESS_KEY_ID" ]] && ((DATABASE_SECRETS++))
          [[ -n "$AWS_SECRET_ACCESS_KEY" ]] && ((DATABASE_SECRETS++))
          [[ -n "$AWS_REGION" ]] && ((DATABASE_SECRETS++))
          [[ -n "$AZURE_STORAGE_CONNECTION_STRING" ]] && ((DATABASE_SECRETS++))

          # API and external services secrets (11 total)
          [[ -n "$STRIPE_PUBLISHABLE_KEY" ]] && ((API_SECRETS++))
          [[ -n "$STRIPE_SECRET_KEY" ]] && ((API_SECRETS++))
          [[ -n "$STRIPE_WEBHOOK_SECRET" ]] && ((API_SECRETS++))
          [[ -n "$SENDGRID_API_KEY" ]] && ((API_SECRETS++))
          [[ -n "$TWILIO_ACCOUNT_SID" ]] && ((API_SECRETS++))
          [[ -n "$TWILIO_AUTH_TOKEN" ]] && ((API_SECRETS++))
          [[ -n "$TWILIO_PHONE_NUMBER" ]] && ((API_SECRETS++))
          [[ -n "$SLACK_WEBHOOK_URL" ]] && ((API_SECRETS++))
          [[ -n "$DISCORD_WEBHOOK_URL" ]] && ((API_SECRETS++))
          [[ -n "$SENTRY_DSN" ]] && ((API_SECRETS++))
          [[ -n "$ROLLBAR_ACCESS_TOKEN" ]] && ((API_SECRETS++))

          # Security and code signing secrets (6 total)
          [[ -n "$CODE_SIGNING_CERTIFICATE" ]] && ((SECURITY_SECRETS++))
          [[ -n "$CODE_SIGNING_CERTIFICATE_PASSWORD" ]] && ((SECURITY_SECRETS++))
          [[ -n "$SSH_PRIVATE_KEY" ]] && ((SECURITY_SECRETS++))
          [[ -n "$GPG_PRIVATE_KEY" ]] && ((SECURITY_SECRETS++))
          [[ -n "$JWT_SECRET" ]] && ((SECURITY_SECRETS++))
          [[ -n "$ENCRYPTION_KEY" ]] && ((SECURITY_SECRETS++))

          echo "| Category | Secrets Available | Total Expected | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------------------|----------------|--------|" >> $GITHUB_STEP_SUMMARY

          if [[ $CI_CD_SECRETS -eq 6 ]]; then
            echo "| 🔄 CI/CD Pipeline | $CI_CD_SECRETS/6 | ✅ Complete |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔄 CI/CD Pipeline | $CI_CD_SECRETS/6 | ❌ Incomplete |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ $MOBILE_SECRETS -eq 9 ]]; then
            echo "| 📱 Mobile Distribution | $MOBILE_SECRETS/9 | ✅ Complete |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 📱 Mobile Distribution | $MOBILE_SECRETS/9 | ⚠️ Partial |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ $ANALYTICS_SECRETS -eq 10 ]]; then
            echo "| 📊 Analytics & Ads | $ANALYTICS_SECRETS/10 | ✅ Complete |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 📊 Analytics & Ads | $ANALYTICS_SECRETS/10 | ⚠️ Partial |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ $PUSH_SECRETS -eq 5 ]]; then
            echo "| 🔔 Push Notifications | $PUSH_SECRETS/5 | ✅ Complete |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔔 Push Notifications | $PUSH_SECRETS/5 | ⚠️ Partial |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ $DATABASE_SECRETS -eq 9 ]]; then
            echo "| 🗄️ Database & Storage | $DATABASE_SECRETS/9 | ✅ Complete |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🗄️ Database & Storage | $DATABASE_SECRETS/9 | ⚠️ Partial |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ $API_SECRETS -eq 11 ]]; then
            echo "| 🔗 API & External Services | $API_SECRETS/11 | ✅ Complete |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔗 API & External Services | $API_SECRETS/11 | ⚠️ Partial |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ $SECURITY_SECRETS -eq 6 ]]; then
            echo "| 🔐 Security & Code Signing | $SECURITY_SECRETS/6 | ✅ Complete |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔐 Security & Code Signing | $SECURITY_SECRETS/6 | ⚠️ Partial |" >> $GITHUB_STEP_SUMMARY
          fi

          TOTAL_AVAILABLE=$((CI_CD_SECRETS + MOBILE_SECRETS + ANALYTICS_SECRETS + PUSH_SECRETS + DATABASE_SECRETS + API_SECRETS + SECURITY_SECRETS))
          TOTAL_EXPECTED=56

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**📈 Overall Summary**: $TOTAL_AVAILABLE/$TOTAL_EXPECTED secrets configured" >> $GITHUB_STEP_SUMMARY
          echo "**Note**: This workflow tests secret availability and basic Firebase authentication (if enabled)." >> $GITHUB_STEP_SUMMARY
          echo "**Action Required**: Configure any missing secrets in repository settings." >> $GITHUB_STEP_SUMMARY